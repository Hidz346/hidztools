<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hidz | Tools</title>
    <link rel="icon" href="https://www.gobox.my.id/file/IcHjU.png" type="image/png">
    
    <!-- React & ReactDOM via CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;700;900&family=VT323&family=Space+Mono:ital,wght@0,400;0,700&display=swap" rel="stylesheet">
    
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Public Sans"', 'sans-serif'],
              pixel: ['VT323', 'monospace'],
              mono: ['"Space Mono"', 'monospace'],
            }
          }
        }
      }
    </script>

    <style>
        body {
            font-family: 'Public Sans', sans-serif;
            overflow-x: hidden;
        }

        /* ─── Neo-brutalism Shadows ─── */
        .neo-shadow    { box-shadow: 6px 6px 0px 0px rgba(0,0,0,1); }
        .neo-shadow-lg { box-shadow: 10px 10px 0px 0px rgba(0,0,0,1); }
        .neo-shadow-sm { box-shadow: 4px 4px 0px 0px rgba(0,0,0,1); }
        .neo-active:active {
            box-shadow: 0px 0px 0px 0px rgba(0,0,0,1) !important;
            transform: translate(4px, 4px) !important;
        }

        /* ─── Y2K Chrome Gradient Text ─── */
        .y2k-chrome {
            background: linear-gradient(90deg, #FF0090, #FF6600, #FFFF00, #00FF88, #00FFFF, #FF0090);
            background-size: 300% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: y2k-shift 4s linear infinite;
        }

        /* ─── Dark BG with Y2K grid ─── */
        .dark-bg {
            background-color: #0A0A0A;
            background-image:
                linear-gradient(rgba(255, 0, 144, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 0, 144, 0.05) 1px, transparent 1px);
            background-size: 36px 36px;
        }
        .light-bg {
            background-color: #F0F0F0;
            background-image:
                linear-gradient(rgba(0,0,0,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.04) 1px, transparent 1px);
            background-size: 36px 36px;
        }

        /* ─── Keyframes ─── */
        @keyframes spin     { 0%   { transform: rotate(0deg);   } 100% { transform: rotate(360deg); } }
        @keyframes blink    { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        @keyframes y2k-shift{ 0%   { background-position: 0% 50%;   } 100% { background-position: 300% 50%; } }
        @keyframes marquee  { 0%   { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        @keyframes float    { 0%, 100% { transform: translateY(0px) rotate(-6deg); } 50% { transform: translateY(-10px) rotate(6deg); } }

        .y2k-blink   { animation: blink  1s step-end infinite; }
        .y2k-marquee { animation: marquee 28s linear infinite; display: inline-block; }
        .y2k-float   { animation: float  3.5s ease-in-out infinite; }

        /* ─── Loading Spinner ─── */
        .spinner {
            border: 4px solid rgba(255, 0, 144, 0.15);
            width: 26px; height: 26px;
            border-radius: 50%;
            border-left-color: #FF0090;
            animation: spin 0.8s linear infinite;
        }

        /* ─── Bento Cell ─── */
        .bento-cell {
            cursor: pointer;
            user-select: none;
            transition: transform 0.08s ease, box-shadow 0.08s ease;
        }
        .bento-cell:not(.bento-selected):hover {
            transform: translate(-2px, -2px);
        }
        .bento-cell:active {
            transform: translate(4px, 4px) !important;
            box-shadow: none !important;
        }

        /* ─── Input focus: Y2K pink ring ─── */
        input:focus, textarea:focus, select:focus {
            outline: none !important;
            box-shadow: 4px 4px 0 0 #FF0090, 0 0 0 3px rgba(255,0,144,0.3) !important;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef } = React;
        const API_KEY = "OwMkM";

        const Sun = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/>
            </svg>
        );

        const Moon = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>
            </svg>
        );

        function App() {
            const [tab, setTab] = useState('brat');
            const [text, setText] = useState('');
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState(null);
            const [theme, setTheme] = useState('dark');
            
            // State Parameter
            const [iqcTime, setIqcTime] = useState('12:00');
            const [iqcBattery, setIqcBattery] = useState('100');
            const [iqcCarrier, setIqcCarrier] = useState('4G');
            const [ssDevice, setSsDevice] = useState('desktop');
            const [gopaySaldo, setGopaySaldo] = useState('1000');
            const [gopayKoin, setGopayKoin] = useState('1000');
            const [gopayPengeluaran, setGopayPengeluaran] = useState('1000');
            const [gopayBulan, setGopayBulan] = useState('Mei');
            const [danaNominal, setDanaNominal] = useState('');

            const fileInputRef = useRef(null);

            const handleProcess = async () => {
                if (tab !== 'uploader' && !text && tab !== 'gopay' && tab !== 'dana') return;
                setLoading(true);
                setResult(null);

                try {
                    if (tab === 'uploader') {
                        const file = fileInputRef.current?.files?.[0];
                        if (!file) { setLoading(false); return; }
                        const formData = new FormData();
                        formData.append('file', file);
                        const res = await fetch('https://www.gobox.my.id/upload', { method: 'POST', body: formData });
                        const data = await res.json();
                        const url = data.url || data.link || data.result?.url || data.data?.url || data.fileUrl;
                        if (url) setResult({ type: 'url', content: url });
                    } else if (tab === 'ssweb') {
                        const apiUrl = `https://api.siputzx.my.id/api/tools/ssweb?url=${encodeURIComponent(text)}&device=${ssDevice}&theme=dark&fullPage=false`;
                        setResult({ type: 'image', content: apiUrl });
                    } else if (tab === 'iqc') {
                        const apiUrl = `https://api.shny.my.id/api/imagecreator/iqc?time=${encodeURIComponent(iqcTime)}&batteryPercentage=${encodeURIComponent(iqcBattery)}&carrierName=${encodeURIComponent(iqcCarrier)}&messageText=${encodeURIComponent(text)}`;
                        const res = await fetch(apiUrl);
                        const blob = await res.blob();
                        setResult({ type: 'image', content: URL.createObjectURL(blob) });
                    } else if (tab === 'gopay') {
                        await generateGoPay();
                    } else if (tab === 'dana') {
                        await generateDana();
                    } else {
                        let api = "";
                        const enc = encodeURIComponent(text);
                        if (tab === 'brat') api = `https://api.theresav.biz.id/maker/brat?text=${enc}`;
                        if (tab === 'bratvid') api = `https://api.theresav.biz.id/maker/bratvid?text=${enc}&format=mp4`;
                        if (tab === 'bratnime') api = `https://api.theresav.biz.id/maker/bratanime?text=${enc}&apikey=${API_KEY}`;
                        if (tab === 'graffiti') api = `https://api.siputzx.my.id/api/m/ephoto360?url=${encodeURIComponent("https://en.ephoto360.com/create-a-cartoon-style-graffiti-text-effect-online-668.html")}&text1=${enc}`;
                        if (tab === 'bratbahlil') api = `https://api.ikyyxd.my.id/maker/bratbahlil?text=${enc}`;

                        if (!api) {
                            setLoading(false);
                            return;
                        }

                        const res = await fetch(api);
                        const blob = await res.blob();
                        const type = tab === 'bratvid' ? 'video' : 'image';
                        setResult({ type, content: URL.createObjectURL(blob) });
                    }
                } catch (e) { alert('Error: ' + e.message); }
                setLoading(false);
            };

            const loadImage = (src) => new Promise((res, rej) => {
                const img = new Image(); img.crossOrigin = 'Anonymous'; img.onload = () => res(img); img.onerror = rej; img.src = src;
            });

            const generateGoPay = async () => {
                const baseUrl = 'https://raw.githubusercontent.com/Ditzzx-vibecoder/Assets/main';
                const [bgImg] = await Promise.all([loadImage(`${baseUrl}/Image/quality_restoration_20260501080321276.jpg`)]);
                const canvas = document.createElement('canvas'); canvas.width = bgImg.width; canvas.height = bgImg.height;
                const ctx = canvas.getContext('2d'); ctx.drawImage(bgImg, 0, 0);
                ctx.fillStyle = '#fff'; ctx.textBaseline = 'top';
                ctx.font = 'bold 34px sans-serif'; 
                ctx.fillText('Rp', 62, 250);
                const rpW = ctx.measureText('Rp').width;
                ctx.font = 'bold 95px serif'; ctx.fillText(gopaySaldo, 62 + rpW + 10, 225);
                ctx.font = 'bold 34px sans-serif'; ctx.fillText(gopayKoin, 115, 400);
                ctx.font = '600 34px sans-serif'; ctx.fillText(`Rp${gopayPengeluaran} udah terpakai di ${gopayBulan}`, 100, 510);
                canvas.toBlob(blob => { if (blob) setResult({ type: 'image', content: URL.createObjectURL(blob) }) }, 'image/jpeg');
            };

            const generateDana = async () => {
                const nominalValue = danaNominal.trim();
                if (!nominalValue) return;
                const apiUrl = `https://api.zenzxz.my.id/maker/fakedanav2?nominal=${encodeURIComponent(nominalValue)}&t=${Date.now()}`;
                const res = await fetch(apiUrl);
                if (!res.ok) throw new Error('API gagal: ' + res.status);
                const blob = await res.blob();
                setResult({ type: 'image', content: URL.createObjectURL(blob) });
            };

            // ─── Tabs: added emoji + spanClass for Bento Grid ───
            const tabs = [
                { id: 'brat',       label: 'Brat',       color: 'bg-yellow-400', emoji: '🎵', spanClass: 'col-span-1 md:col-span-2' },
                { id: 'bratvid',    label: 'BRATVID',    color: 'bg-green-400',  emoji: '🎬', spanClass: 'col-span-1' },
                { id: 'bratnime',   label: 'BratAnime',  color: 'bg-pink-400',   emoji: '🌸', spanClass: 'col-span-1' },
                { id: 'bratbahlil', label: 'BratBahlil', color: 'bg-lime-400',   emoji: '💢', spanClass: 'col-span-1' },
                { id: 'graffiti',   label: 'Grafiti',    color: 'bg-blue-400',   emoji: '🎨', spanClass: 'col-span-1' },
                { id: 'iqc',        label: 'IQC',        color: 'bg-orange-400', emoji: '📱', spanClass: 'col-span-1 md:col-span-2' },
                { id: 'uploader',   label: 'UpLOADER',   color: 'bg-purple-400', emoji: '☁️', spanClass: 'col-span-2' },
                { id: 'ssweb',      label: 'SSWEB',      color: 'bg-red-400',    emoji: '🖥️', spanClass: 'col-span-1' },
                { id: 'gopay',      label: 'GoPay',      color: 'bg-teal-400',   emoji: '💳', spanClass: 'col-span-1' },
                { id: 'dana',       label: 'Dana',        color: 'bg-sky-400',   emoji: '💸', spanClass: 'col-span-2 md:col-span-4' },
            ];

            const activeTab = tabs.find(t => t.id === tab);

            return (
                <div className={`min-h-screen ${theme === 'dark' ? 'dark-bg text-white' : 'light-bg text-black'} transition-colors duration-500 overflow-x-hidden`}>

                    {/* ─── NAV ─── */}
                    <nav className="fixed top-0 left-0 right-0 z-50 border-b-[4px] border-black">
                        {/* Main bar */}
                        <div className="bg-[#FF0090] h-14 md:h-16 flex items-center px-3 md:px-6">
                            <div className="max-w-2xl w-full mx-auto flex justify-between items-center">
                                <div className="flex items-center gap-2 md:gap-3">
                                    <div className="text-lg md:text-xl font-black italic border-[3px] border-black bg-white px-3 py-1 neo-shadow-sm text-black tracking-tighter uppercase">
                                        Hidz Forum
                                    </div>
                                    <span className="font-pixel text-yellow-200 text-xl hidden sm:block y2k-float select-none">★</span>
                                </div>
                                <button 
                                    onClick={() => setTheme(p => p === 'light' ? 'dark' : 'light')}
                                    className="p-2 border-[3px] border-black bg-yellow-400 text-black neo-shadow-sm neo-active flex items-center justify-center transition-transform hover:-translate-y-[2px]"
                                >
                                    {theme === 'dark' ? <Sun className="w-5 h-5 md:w-6 md:h-6 stroke-[3]" /> : <Moon className="w-5 h-5 md:w-6 md:h-6 stroke-[3]" />}
                                </button>
                            </div>
                        </div>
                        {/* Y2K Marquee Bar */}
                        <div className="bg-black h-6 overflow-hidden flex items-center">
                            <span className="y2k-marquee font-pixel text-[11px] text-yellow-400 tracking-[0.3em] whitespace-nowrap select-none">
                                ★ BRAT &nbsp;✦ BRATVID &nbsp;★ BRATNIME &nbsp;✦ BRATBAHLIL &nbsp;★ GRAFFITI &nbsp;✦ IQC &nbsp;★ UPLOADER &nbsp;✦ SSWEB &nbsp;★ GOPAY &nbsp;✦ DANA &nbsp;★ BRAT &nbsp;✦ BRATVID &nbsp;★ BRATNIME &nbsp;✦ BRATBAHLIL &nbsp;★ GRAFFITI &nbsp;✦ IQC &nbsp;★ UPLOADER &nbsp;✦ SSWEB &nbsp;★ GOPAY &nbsp;✦ DANA &nbsp;
                            </span>
                        </div>
                    </nav>

                    <main className="pt-24 md:pt-28 pb-8 px-3 md:px-4 max-w-2xl mx-auto">

                        {/* ─── HERO ─── */}
                        <div className="text-center py-5 md:py-7">
                            <div className="font-pixel text-xs tracking-[0.35em] opacity-30 mb-2 select-none">
                                ✦ ✧ ★ ✦ ✧ ★ ✦ ✧ ★ ✦ ✧ ★ ✦ ✧
                            </div>
                            <h1 className="text-5xl md:text-7xl font-black italic uppercase tracking-tighter y2k-chrome leading-none">
                                HidzTools
                            </h1>
                            <p className="font-pixel text-xs md:text-sm mt-2 opacity-40 tracking-[0.25em]">
                                YOUR CHAOS GENERATOR
                            </p>
                            <div className="font-pixel text-xs tracking-[0.35em] opacity-20 mt-2 select-none">
                                ✦ ✧ ★ ✦ ✧ ★ ✦ ✧ ★ ✦ ✧ ★ ✦ ✧
                            </div>
                        </div>

                        {/* ─── BENTO GRID TABS ─── */}
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-2 mb-6 md:mb-8">
                            {tabs.map((t) => {
                                const isActive = tab === t.id;
                                return (
                                    <div
                                        key={t.id}
                                        onClick={() => { setTab(t.id); setResult(null); }}
                                        className={`${t.spanClass} bento-cell border-[3px] md:border-[4px] border-black p-3 md:p-4 min-h-[66px] md:min-h-[80px]
                                            ${isActive
                                                ? `${t.color} text-black bento-selected translate-x-[4px] translate-y-[4px]`
                                                : `${theme === 'dark' ? 'bg-[#141414]' : 'bg-white'} neo-shadow`
                                            }`}
                                    >
                                        <div className="text-xl md:text-2xl leading-none mb-1">{t.emoji}</div>
                                        <div className="font-black text-[9px] md:text-[10px] uppercase tracking-[0.15em] leading-tight">
                                            {t.label}
                                        </div>
                                        {isActive && (
                                            <div className="font-pixel text-[9px] mt-1 y2k-blink">▮ ON</div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>

                        <div className="space-y-6">

                            {/* ─── MAIN CARD ─── */}
                            <div className={`border-[3px] md:border-[4px] border-black p-4 md:p-8 neo-shadow-lg ${theme === 'dark' ? 'bg-[#0f0f0f]' : 'bg-white'}`}>

                                {/* Card Header */}
                                <div className="flex items-start justify-between mb-6 md:mb-8">
                                    <div>
                                        <h2 className="text-3xl md:text-5xl font-black italic uppercase underline decoration-[5px] md:decoration-8 decoration-[#FF0090] leading-none tracking-tighter">
                                            {activeTab?.label || tab}
                                        </h2>
                                        <p className="font-pixel text-[10px] mt-2 opacity-40 tracking-wider">
                                            HidzTools // {tab.toUpperCase()}
                                        </p>
                                    </div>
                                    {loading
                                        ? <div className="spinner mt-1 shrink-0"></div>
                                        : <div className={`w-10 h-10 md:w-12 md:h-12 shrink-0 ${activeTab?.color || 'bg-yellow-400'} flex items-center justify-center text-xl md:text-2xl border-[3px] md:border-[4px] border-black neo-shadow-sm`}>
                                            {activeTab?.emoji || '?'}
                                          </div>
                                    }
                                </div>

                                {/* ─── Input Forms (unchanged logic) ─── */}
                                <div className="space-y-6">
                                    {tab === 'uploader' ? (
                                        <input type="file" ref={fileInputRef} className="w-full border-[4px] border-black p-4 bg-gray-50 text-black font-bold text-lg focus:bg-white" />
                                    ) : tab === 'gopay' ? (
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="space-y-2">
                                                <label className="block text-[10px] font-black uppercase tracking-widest mb-1">Saldo</label>
                                                <input type="text" value={gopaySaldo} onChange={e => setGopaySaldo(e.target.value)} className="w-full border-[4px] border-black p-4 text-black text-lg bg-gray-50 focus:bg-white font-bold" />
                                            </div>
                                            <div className="space-y-2">
                                                <label className="block text-[10px] font-black uppercase tracking-widest mb-1">Koin</label>
                                                <input type="text" value={gopayKoin} onChange={e => setGopayKoin(e.target.value)} className="w-full border-[4px] border-black p-4 text-black text-lg bg-gray-50 focus:bg-white font-bold" />
                                            </div>
                                            <div className="space-y-2">
                                                <label className="block text-[10px] font-black uppercase tracking-widest mb-1">Pengeluaran</label>
                                                <input type="text" value={gopayPengeluaran} onChange={e => setGopayPengeluaran(e.target.value)} className="w-full border-[4px] border-black p-4 text-black text-lg bg-gray-50 focus:bg-white font-bold" />
                                            </div>
                                            <div className="space-y-2">
                                                <label className="block text-[10px] font-black uppercase tracking-widest mb-1">Bulan</label>
                                                <input type="text" value={gopayBulan} onChange={e => setGopayBulan(e.target.value)} className="w-full border-[4px] border-black p-4 text-black text-lg bg-gray-50 focus:bg-white font-bold" />
                                            </div>
                                        </div>
                                    ) : tab === 'dana' ? (
                                        <div className="space-y-2">
                                            <label className="block text-[10px] font-black uppercase tracking-widest mb-1">Nominal</label>
                                            <input type="text" value={danaNominal} onChange={e => setDanaNominal(e.target.value)} className="w-full border-[4px] border-black p-4 text-black text-xl bg-gray-50 focus:bg-white font-bold" placeholder="1000" />
                                        </div>
                                    ) : tab === 'iqc' ? (
                                        <div className="space-y-4">
                                            <div className="grid grid-cols-3 gap-4">
                                                <div className="space-y-2">
                                                    <label className="block text-[10px] font-black uppercase tracking-widest mb-1">Jam</label>
                                                    <input type="time" value={iqcTime} onChange={e => setIqcTime(e.target.value)} className="w-full border-[4px] border-black p-3 text-black text-sm bg-gray-50 focus:bg-white font-bold" />
                                                </div>
                                                <div className="space-y-2">
                                                    <label className="block text-[10px] font-black uppercase tracking-widest mb-1">Batre</label>
                                                    <input type="number" value={iqcBattery} onChange={e => setIqcBattery(e.target.value)} className="w-full border-[4px] border-black p-3 text-black text-sm bg-gray-50 focus:bg-white font-bold" />
                                                </div>
                                                <div className="space-y-2">
                                                    <label className="block text-[10px] font-black uppercase tracking-widest mb-1">Provider</label>
                                                    <input type="text" value={iqcCarrier} onChange={e => setIqcCarrier(e.target.value)} className="w-full border-[4px] border-black p-3 text-black text-sm bg-gray-50 focus:bg-white font-bold" />
                                                </div>
                                            </div>
                                            <div className="space-y-2">
                                                <label className="block text-[10px] font-black uppercase tracking-widest mb-1">Enter Your Text</label>
                                                <textarea 
                                                    value={text} onChange={e => setText(e.target.value)}
                                                    className="w-full border-[4px] border-black p-4 bg-gray-50 focus:bg-white text-black font-bold h-32 text-xl placeholder:opacity-30"
                                                    placeholder="Pesan..."
                                                />
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="space-y-2">
                                            <label className="block text-[10px] font-black uppercase tracking-widest mb-1">Enter Your Text</label>
                                            <textarea 
                                                value={text} onChange={e => setText(e.target.value)}
                                                className="w-full border-[4px] border-black p-4 bg-gray-50 focus:bg-white text-black font-bold h-32 text-xl placeholder:opacity-30"
                                                placeholder={tab === 'ssweb' ? 'https://google.com' : 'Type something bold...'}
                                            />
                                        </div>
                                    )}

                                    {/* ─── Generate Button ─── */}
                                    <button 
                                        onClick={handleProcess} disabled={loading}
                                        className="w-full bg-[#FF0090] text-white border-[3px] md:border-[4px] border-black py-3 md:py-4 font-pixel text-xl md:text-2xl uppercase tracking-widest neo-shadow neo-active disabled:opacity-50 transition-all mt-2"
                                    >
                                        {loading ? '⟳ LOADING...' : '★ GENERATE ★'}
                                    </button>
                                </div>
                            </div>

                            {/* ─── RESULT ─── */}
                            {result && (
                                <div className={`border-[3px] md:border-[4px] border-black p-4 md:p-6 neo-shadow-lg ${theme === 'dark' ? 'bg-[#0f0f0f]' : 'bg-[#E5E5E5]'}`}>
                                    <div className="flex justify-between items-center mb-4">
                                        <div className="font-pixel text-[11px] md:text-xs uppercase tracking-[0.2em] opacity-50 flex items-center gap-2">
                                            <span className="y2k-blink">★</span> Live Preview
                                        </div>
                                        {result.type !== 'url' && (
                                            <a href={result.content} download className="px-4 py-1.5 md:px-6 md:py-2 border-[3px] md:border-[4px] border-black bg-emerald-400 neo-shadow-sm neo-active text-[10px] md:text-xs font-black inline-block text-black hover:-translate-y-[2px] transition-transform">
                                                DOWNLOAD PNG
                                            </a>
                                        )}
                                    </div>
                                    <div className="border-[3px] md:border-[4px] border-black bg-white p-2 overflow-hidden flex justify-center">
                                        {result.type === 'image' && <img src={result.content} className="max-w-full h-auto max-h-[500px] object-contain border-[3px] md:border-[4px] border-black neo-shadow" alt="Generated result" />}
                                        {result.type === 'video' && <video src={result.content} controls autoPlay loop className="max-w-full border-[3px] md:border-[4px] border-black neo-shadow" />}
                                        {result.type === 'url' && (
                                            <div className="p-4 md:p-8 text-center w-full">
                                                <p className="text-black break-all font-bold text-sm md:text-lg mb-6 bg-gray-50 p-3 md:p-4 border-[3px] md:border-[4px] border-black">{result.content}</p>
                                                <button 
                                                    onClick={() => { navigator.clipboard.writeText(result.content); alert('Copied!'); }}
                                                    className="px-4 py-2 md:px-6 md:py-3 border-[3px] md:border-[4px] border-black bg-sky-400 text-xs md:text-sm font-black neo-shadow-sm neo-active text-black uppercase hover:-translate-y-[2px] transition-transform"
                                                >
                                                    Share Link
                                                </button>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>

                    {/* ─── FOOTER ─── */}
                    <footer className="bg-black border-t-[4px] border-black text-white flex items-center justify-between px-6 py-4 mt-12 mb-0">
                        <span className="font-pixel text-[11px] tracking-[0.25em] text-yellow-400">★ HIDZ TOOLS ★</span>
                        <div className="hidden sm:flex gap-6 font-pixel text-[9px] tracking-widest opacity-60">
                            <span>TERMS OF CHAOS</span>
                            <span>BRUTALIST POLICY</span>
                            <span className="text-[#FF0090]">BY HIDZ FORUM</span>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

(function(){
  function removeAds(){
    var ad=document.getElementById('server-footer-ad');
    if(ad)ad.remove();
    document.querySelectorAll('link[href*="ads.css"]').forEach(function(el){el.remove();});
  }
  removeAds();
  new MutationObserver(function(){removeAds();}).observe(document.documentElement,{childList:true,subtree:true});
})();
</script>
